name: Community Prompt
 description: Submit a prompt to the community library
title: '[Community Prompt] '
labels: ['community-prompt']
body:
  - type: input
    id: title
    attributes:
      label: Prompt title
      placeholder: e.g. Next.js Auth Flow
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - feature
        - bugfix
        - refactor
        - test
        - docs
    validations:
      required: true

  - type: dropdown
    id: tool
    attributes:
      label: Primary tool
      options:
        - cursor
        - claude-code
        - windsurf
        - universal
    validations:
      required: true

  - type: dropdown
    id: stack
    attributes:
      label: Stack
      options:
        - nextjs
        - python
        - rust
        - universal
    validations:
      required: true

  - type: textarea
    id: prompt
    attributes:
      label: Prompt text
      description: Paste the full prompt here.
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short description
      placeholder: One or two sentences describing what the prompt does.
    validations:
      required: true

  - type: textarea
    id: when-to-use
    attributes:
      label: When to use
      placeholder: Describe the situation where this prompt is most useful.
    validations:
      required: true

  - type: input
    id: author
    attributes:
      label: Author
      placeholder: '@your-github-handle'
    validations:
      required: true
