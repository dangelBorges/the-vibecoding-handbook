name: Vibe Check

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  vibe:
    name: Run vibe checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Vibe checks
        uses: ./.github/actions/vibe-check
        with:
          cli-path: 'cli'
          review-base: 'origin/main'
          review-strict: 'false'
