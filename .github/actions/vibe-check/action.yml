name: 'Vibe Coding Check'
description: 'Run vibe check and vibe review in CI/CD'
author: 'The Vibecoding Handbook'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  version:
    description: 'Version of @vibecoding/cli to install (e.g. 1.0.0 or latest). Ignored when cli-path is set.'
    required: false
    default: 'latest'
  cli-path:
    description: 'Path to a local @vibecoding/cli checkout to use instead of installing from npm.'
    required: false
    default: ''
  init-template:
    description: 'Run vibe init -y -t <template> before the check. Leave empty to skip.'
    required: false
    default: ''
  check-strict:
    description: 'Run vibe check --strict'
    required: false
    default: 'true'
  run-check:
    description: 'Run vibe check'
    required: false
    default: 'true'
  review-base:
    description: 'Git ref to diff against for vibe review --base (e.g. origin/main). Leave empty to skip review.'
    required: false
    default: ''
  review-strict:
    description: 'Add --strict to vibe review'
    required: false
    default: 'false'
  run-review:
    description: 'Run vibe review when review-base is set'
    required: false
    default: 'true'
  working-directory:
    description: 'Working directory for the commands'
    required: false
    default: '.'

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup pnpm
      if: ${{ inputs.cli-path != '' }}
      uses: pnpm/action-setup@v4
      with:
        version: 10.26.2

    - name: Build local CLI
      if: ${{ inputs.cli-path != '' }}
      shell: bash
      run: |
        cd "${{ github.workspace }}/${{ inputs.cli-path }}"
        pnpm install --frozen-lockfile
        pnpm run build

    - name: Install @vibecoding/cli
      if: ${{ inputs.cli-path == '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: npm install -g @vibecoding/cli@${{ inputs.version }}

    - name: Run vibe init
      if: ${{ inputs.init-template != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.cli-path }}" != "" ]; then
          node ${{ github.workspace }}/${{ inputs.cli-path }}/dist/index.js init -y -t ${{ inputs.init-template }}
        else
          vibe init -y -t ${{ inputs.init-template }}
        fi

    - name: Run vibe check
      if: ${{ inputs.run-check == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.cli-path }}" != "" ]; then
          CLI_CMD="node ${{ github.workspace }}/${{ inputs.cli-path }}/dist/index.js"
        else
          CLI_CMD="vibe"
        fi
        if [ "${{ inputs.check-strict }}" = "true" ]; then
          $CLI_CMD check --strict
        else
          $CLI_CMD check
        fi

    - name: Run vibe review
      if: ${{ inputs.review-base != '' && inputs.run-review == 'true' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if [ "${{ inputs.cli-path }}" != "" ]; then
          CLI_CMD="node ${{ github.workspace }}/${{ inputs.cli-path }}/dist/index.js"
        else
          CLI_CMD="vibe"
        fi
        if [ "${{ inputs.review-strict }}" = "true" ]; then
          $CLI_CMD review --base ${{ inputs.review-base }} --strict
        else
          $CLI_CMD review --base ${{ inputs.review-base }}
        fi
